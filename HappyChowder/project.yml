name: HappyChowder
options:
  bundleIdPrefix: com.happychowder
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: "16.1.1"
  Sodium:
    url: https://github.com/nicklama/swift-sodium
    from: "0.9.2"

targets:
  HappyChowder:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HappyChowder
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: HappyChowder/Info.plist
        CODE_SIGN_ENTITLEMENTS: HappyChowder/HappyChowder.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.happychowder.app
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
    dependencies:
      - package: SocketIO
      - package: Sodium
      - target: HappyChowderWidgetExtension

  HappyChowderWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HappyChowderWidget
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: HappyChowderWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.happychowder.app.widget
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: HappyChowderWidget/HappyChowderWidget.entitlements
